version: '3'
services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: blog_app
      MY_USER: admin
      MYSQL_PASSWORD: password
      networks: 
        - app-network
  nginx:
    image: nginx:latest
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - mysql
    networks: 
      - app-network
  frontend:
    build: ./Frontend
    container_name: frontend-container
    networks: 
      - app-network
  backend:
    build: ./Backend
    container_name: backend-container
    depends_on:
      - mysql
    networks: 
      - app-network
  